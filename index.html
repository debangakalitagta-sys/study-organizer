<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KnowFlow</title>

  <!-- Bebas Neue Font -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="heading">KnowFlow</h1>

  <div class="top-bar">
    <div class="form">
      <input type="text" id="title" placeholder="Resource Title">

      <select id="subject">
        <option value="">Subject</option>
        <option value="Engineering Maths">Engineering Maths</option>
        <option value="Mechanics">Mechanics</option>
        <option value="Core">Core</option>
        <option value="Signals and Systems">Signals and Systems</option>
      </select>

      <select id="semester">
        <option value="">Semester</option>
        <option value="Semester 1">Semester 1</option>
        <option value="Semester 2">Semester 2</option>
        <option value="Semester 3">Semester 3</option>
        <option value="Semester 4">Semester 4</option>
        <option value="Semester 5">Semester 5</option>
        <option value="Semester 6">Semester 6</option>
        <option value="Semester 7">Semester 7</option>
        <option value="Semester 8">Semester 8</option>
      </select>

      <button onclick="addResource()">Add</button>
    </div>

    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="search" placeholder="Search..." oninput="displayResources()">
    </div>
  </div>

  <div id="resourceList"></div>

  <script src="script.js"></script>
</body>
</html>
